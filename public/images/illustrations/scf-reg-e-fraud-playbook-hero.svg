<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Regulation E fraud cash-flow playbook dashboard</title>
  <desc id="desc">A checking account dashboard showing suspicious transactions, deadline cards, and protected cash buckets.</desc>
  <rect width="1200" height="675" fill="#f4fbf8"/>
  <circle cx="1010" cy="95" r="170" fill="#d8f3ea"/>
  <circle cx="170" cy="590" r="210" fill="#e6f4ff"/>
  <rect x="96" y="90" width="1008" height="495" rx="34" fill="#ffffff" stroke="#1f7663" stroke-width="4"/>
  <rect x="136" y="138" width="500" height="80" rx="18" fill="#073b3a"/>
  <text x="168" y="188" font-family="Inter,Arial,sans-serif" font-size="35" font-weight="700" fill="#ffffff">Unauthorized transfer response</text>
  <rect x="690" y="138" width="360" height="80" rx="18" fill="#effaf6" stroke="#9bd8c6"/>
  <text x="718" y="171" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700" fill="#073b3a">Cash-flow objective</text>
  <text x="718" y="198" font-family="Inter,Arial,sans-serif" font-size="22" fill="#0f6255">Stop loss → document → restore funds</text>
  <g font-family="Inter,Arial,sans-serif" font-weight="700">
    <rect x="142" y="270" width="208" height="190" rx="24" fill="#fff4e5" stroke="#f4a62a"/>
    <text x="174" y="326" font-size="24" fill="#8a4b00">1. Freeze</text>
    <text x="174" y="362" font-size="18" font-weight="500" fill="#58412a">Lock card, change login,</text>
    <text x="174" y="389" font-size="18" font-weight="500" fill="#58412a">preserve screenshots.</text>
    <rect x="390" y="270" width="208" height="190" rx="24" fill="#eef7ff" stroke="#56a5dc"/>
    <text x="422" y="326" font-size="24" fill="#145c8b">2. Notify</text>
    <text x="422" y="362" font-size="18" font-weight="500" fill="#29485d">Call bank and send a</text>
    <text x="422" y="389" font-size="18" font-weight="500" fill="#29485d">written dispute.</text>
    <rect x="638" y="270" width="208" height="190" rx="24" fill="#effaf6" stroke="#4bbf9b"/>
    <text x="670" y="326" font-size="24" fill="#0f6255">3. Track</text>
    <text x="670" y="362" font-size="18" font-weight="500" fill="#315a51">Calendar provisional</text>
    <text x="670" y="389" font-size="18" font-weight="500" fill="#315a51">credit and decision dates.</text>
    <rect x="886" y="270" width="168" height="190" rx="24" fill="#f6efff" stroke="#9d78d6"/>
    <text x="918" y="326" font-size="24" fill="#5b3d91">4. Escalate</text>
    <text x="918" y="362" font-size="18" font-weight="500" fill="#4f4262">Use CFPB, FTC,</text>
    <text x="918" y="389" font-size="18" font-weight="500" fill="#4f4262">police reports.</text>
  </g>
  <path d="M350 365h40M598 365h40M846 365h40" stroke="#073b3a" stroke-width="8" stroke-linecap="round"/>
  <path d="M380 350l18 15-18 15M628 350l18 15-18 15M876 350l18 15-18 15" fill="none" stroke="#073b3a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="180" y="508" width="840" height="36" rx="18" fill="#d8f3ea"/>
  <text x="600" y="533" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700" fill="#073b3a">Built for consumers protecting rent, payroll, and emergency cash after account fraud</text>
</svg>
