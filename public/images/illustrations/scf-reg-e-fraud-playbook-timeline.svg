<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">Regulation E error resolution timeline</title><desc id="desc">A timeline with day zero notice, bank investigation, provisional credit, and final decision checkpoints.</desc>
<rect width="1200" height="675" fill="#fbf8f1"/><rect x="90" y="105" width="1020" height="465" rx="32" fill="#fff" stroke="#d98c25" stroke-width="4"/>
<text x="130" y="170" font-family="Inter,Arial,sans-serif" font-size="34" font-weight="800" fill="#5d3600">Regulation E timing map</text>
<line x1="165" y1="345" x2="1035" y2="345" stroke="#0f6255" stroke-width="10" stroke-linecap="round"/>
<g font-family="Inter,Arial,sans-serif">
  <circle cx="185" cy="345" r="34" fill="#0f6255"/><text x="185" y="355" text-anchor="middle" font-size="28" font-weight="800" fill="#fff">0</text>
  <text x="135" y="430" font-size="24" font-weight="700" fill="#073b3a">Notice</text><text x="118" y="462" font-size="18" fill="#5d4a2e">Report promptly</text>
  <circle cx="390" cy="345" r="34" fill="#56a5dc"/><text x="390" y="355" text-anchor="middle" font-size="24" font-weight="800" fill="#fff">10</text>
  <text x="325" y="252" font-size="24" font-weight="700" fill="#145c8b">Provisional credit</text><text x="322" y="282" font-size="18" fill="#37566b">often due if unresolved</text>
  <circle cx="610" cy="345" r="34" fill="#9d78d6"/><text x="610" y="355" text-anchor="middle" font-size="24" font-weight="800" fill="#fff">45</text>
  <text x="545" y="430" font-size="24" font-weight="700" fill="#5b3d91">Investigation</text><text x="535" y="462" font-size="18" fill="#554563">standard outer window</text>
  <circle cx="820" cy="345" r="34" fill="#f4a62a"/><text x="820" y="355" text-anchor="middle" font-size="24" font-weight="800" fill="#fff">60</text>
  <text x="747" y="252" font-size="24" font-weight="700" fill="#8a4b00">Statement clock</text><text x="728" y="282" font-size="18" fill="#6d4d24">do not let mail sit</text>
  <circle cx="1020" cy="345" r="34" fill="#073b3a"/><text x="1020" y="355" text-anchor="middle" font-size="23" font-weight="800" fill="#fff">90</text>
  <text x="936" y="430" font-size="24" font-weight="700" fill="#073b3a">Special cases</text><text x="920" y="462" font-size="18" fill="#315a51">new accounts/foreign/POS</text>
</g>
<rect x="170" y="510" width="860" height="34" rx="17" fill="#fff4e5"/><text x="600" y="534" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="700" fill="#6b450c">Use this as a planning prompt, not legal advice: exact timing depends on the transaction and account facts.</text>
</svg>
