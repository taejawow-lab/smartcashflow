<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">Fraud cash buckets after a compromised account</title><desc id="desc">A layered cash reserve diagram separating operating money, protected bills, emergency float, and frozen disputed funds.</desc>
<rect width="1200" height="675" fill="#f3f8ff"/><text x="110" y="110" font-family="Inter,Arial,sans-serif" font-size="36" font-weight="800" fill="#073b3a">Fraud-resilient cash buckets</text>
<g font-family="Inter,Arial,sans-serif">
 <rect x="125" y="165" width="950" height="95" rx="24" fill="#073b3a"/><text x="165" y="222" font-size="28" font-weight="800" fill="#fff">Primary checking: daily spending only</text><text x="785" y="222" font-size="22" fill="#bfe9dc">low balance target</text>
 <rect x="125" y="285" width="950" height="95" rx="24" fill="#0f6255"/><text x="165" y="342" font-size="28" font-weight="800" fill="#fff">Bills account: rent, utilities, insurance</text><text x="785" y="342" font-size="22" fill="#d8f3ea">locked payees</text>
 <rect x="125" y="405" width="950" height="95" rx="24" fill="#56a5dc"/><text x="165" y="462" font-size="28" font-weight="800" fill="#fff">Emergency savings: separate institution</text><text x="785" y="462" font-size="22" fill="#e6f4ff">transfer buffer</text>
 <rect x="125" y="525" width="950" height="70" rx="24" fill="#fff4e5" stroke="#f4a62a" stroke-width="3"/><text x="165" y="570" font-size="25" font-weight="800" fill="#8a4b00">Disputed funds: tracked in a claim log, not counted as spendable until final</text>
</g>
<path d="M1015 244c-30 46-30 80 0 126s30 80 0 126" fill="none" stroke="#9d78d6" stroke-width="10" stroke-linecap="round"/>
<text x="925" y="150" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700" fill="#5b3d91">Limit blast radius</text>
</svg>
