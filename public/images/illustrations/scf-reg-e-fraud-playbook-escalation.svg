<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">Escalation ladder for bank fraud disputes</title><desc id="desc">An escalation ladder from bank notice to regulator complaint to account rebuild.</desc>
<rect width="1200" height="675" fill="#f2fbf7"/><text x="110" y="95" font-family="Inter,Arial,sans-serif" font-size="36" font-weight="800" fill="#073b3a">Escalation ladder when the claim stalls</text>
<g font-family="Inter,Arial,sans-serif" font-weight="800">
 <rect x="145" y="505" width="910" height="82" rx="18" fill="#d8f3ea"/><text x="190" y="558" font-size="26" fill="#073b3a">1. Ask bank for written reason, evidence relied on, and appeal path</text>
 <rect x="210" y="400" width="780" height="82" rx="18" fill="#eff7ff"/><text x="255" y="453" font-size="26" fill="#145c8b">2. File CFPB complaint for consumer financial product issues</text>
 <rect x="275" y="295" width="650" height="82" rx="18" fill="#fff4e5"/><text x="320" y="348" font-size="26" fill="#8a4b00">3. Report scam or identity theft to FTC</text>
 <rect x="340" y="190" width="520" height="82" rx="18" fill="#f6efff"/><text x="385" y="243" font-size="26" fill="#5b3d91">4. Rebuild accounts and payment rails</text>
</g>
<path d="M600 505V272" stroke="#0f6255" stroke-width="9" stroke-linecap="round"/><path d="M575 296l25-32 25 32" fill="none" stroke="#0f6255" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
<text x="600" y="635" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700" fill="#315a51">Escalate with facts, dates, and documents—not emotion or guesswork.</text>
</svg>
