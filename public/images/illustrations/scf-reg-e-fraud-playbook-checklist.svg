<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">Documentation checklist for unauthorized electronic transfers</title><desc id="desc">A checklist showing evidence items to gather when disputing unauthorized transfers.</desc>
<rect width="1200" height="675" fill="#f8f5ff"/><rect x="155" y="70" width="890" height="535" rx="34" fill="#fff" stroke="#9d78d6" stroke-width="4"/>
<text x="210" y="138" font-family="Inter,Arial,sans-serif" font-size="36" font-weight="800" fill="#5b3d91">Evidence pack for the bank file</text>
<g font-family="Inter,Arial,sans-serif" font-size="24" fill="#342846">
 <g transform="translate(225 205)"><rect width="48" height="48" rx="12" fill="#d8f3ea"/><path d="M13 25l8 9 16-20" fill="none" stroke="#0f6255" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><text x="72" y="32" font-weight="700">Transaction dates, amounts, merchant IDs, and account used</text></g>
 <g transform="translate(225 285)"><rect width="48" height="48" rx="12" fill="#d8f3ea"/><path d="M13 25l8 9 16-20" fill="none" stroke="#0f6255" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><text x="72" y="32" font-weight="700">Screenshots before the app or website changes the display</text></g>
 <g transform="translate(225 365)"><rect width="48" height="48" rx="12" fill="#d8f3ea"/><path d="M13 25l8 9 16-20" fill="none" stroke="#0f6255" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><text x="72" y="32" font-weight="700">Call date, representative name, claim number, and promises</text></g>
 <g transform="translate(225 445)"><rect width="48" height="48" rx="12" fill="#d8f3ea"/><path d="M13 25l8 9 16-20" fill="none" stroke="#0f6255" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><text x="72" y="32" font-weight="700">Written dispute, FTC report, police report if identity theft</text></g>
 <g transform="translate(225 525)"><rect width="48" height="48" rx="12" fill="#fff4e5"/><path d="M13 25l8 9 16-20" fill="none" stroke="#d98c25" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><text x="72" y="32" font-weight="700">Calendar reminders for credit, decision, and appeal dates</text></g>
</g>
</svg>
